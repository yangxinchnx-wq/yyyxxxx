<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Deep Solid Obsidian Black Background -->
  <rect width="500" height="500" fill="#000000" />
  
  <!-- "Xiaomi" in brand-faithful modern clean typography -->
  <text x="250" y="195" 
        fill="#FFFFFF" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="62" 
        font-weight="600" 
        letter-spacing="1.5" 
        text-anchor="middle">Xiaomi</text>
        
  <!-- "MIMO" in high-fidelity custom tech vector paths mimicking the official logo -->
  <g>
    <!-- First Letter M -->
    <rect x="74" y="280" width="14" height="70" rx="7" fill="#FFFFFF" />
    <path d="M 98,280 L 119,325 L 140,280" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="150" y="280" width="14" height="70" rx="7" fill="#FFFFFF" />
    
    <!-- Letter I -->
    <rect x="192" y="280" width="14" height="70" rx="7" fill="#FFFFFF" />
    
    <!-- Second Letter M -->
    <rect x="234" y="280" width="14" height="70" rx="7" fill="#FFFFFF" />
    <path d="M 258,280 L 279,325 L 300,280" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="310" y="280" width="14" height="70" rx="7" fill="#FFFFFF" />
    
    <!-- Letter O (Circular techno loop with top-right opening) -->
    <path d="M 399,283 A 35,35 0 1,1 409,293" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  </g>
</svg>
